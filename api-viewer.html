<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>API Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #fff;
      --ink: #1a1208;
      --muted: #9a8f7a;
      --red: #e8401c;
      --blue: #1a56db;
      --border: #ddd5c0;
      --tag: #f0e8d5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'Gmarket Sans', sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* Top bar */
    .topbar {
      background: var(--ink);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-title { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .topbar-time { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #888; }

    /* Controls */
    .controls {
      padding: 16px 20px 0;
      display: flex;
      gap: 10px;
    }
    .refresh-btn {
      background: var(--ink); color: #fff; border: none; border-radius: 50px;
      padding: 9px 20px; font-family: 'Gmarket Sans', sans-serif; font-size: 12px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s;
    }
    .refresh-btn:active { opacity: 0.7; }
    .refresh-btn:disabled { opacity: 0.4; }
    .auto-toggle {
      background: var(--tag); color: var(--ink); border: 1.5px solid var(--border);
      border-radius: 50px; padding: 8px 16px; font-family: 'Gmarket Sans', sans-serif;
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .auto-toggle.on { background: var(--blue); color: #fff; border-color: var(--blue); }
    .status { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); padding: 6px 20px 0; min-height: 20px; }

    /* Cards */
    .cards { padding: 16px 20px 0; display: flex; flex-direction: column; gap: 14px; }

    .api-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .card-header.red { background: var(--red); }
    .card-header.blue { background: var(--blue); }
    .card-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .card-meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.6);
    }
    .meta-key {
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.08em;
    }
    .meta-sep { color: rgba(255,255,255,0.3); margin: 0 2px; }
    .card-url { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 2px; word-break: break-all; }
    .card-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      padding: 3px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    /* Main value */
    .card-value-wrap {
      padding: 20px 18px 16px;
      position: relative;
    }
    .value-field-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .value-text {
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
      word-break: keep-all;
      line-height: 1.3;
    }
    .value-text.red { color: var(--red); }
    .value-text.blue { color: var(--blue); }
    .value-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* History (for API 1) */
    .history-section {
      border-top: 1px solid var(--border);
      padding: 12px 18px;
    }
    .history-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #f0ebe0;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item.first .h-query { color: var(--red); font-weight: 700; }
    .h-query { font-size: 13px; color: var(--ink); flex: 1; word-break: keep-all; }
    .h-time { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); flex-shrink: 0; }

    /* Extra fields (for API 2) */
    .extra-section {
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .extra-item {}
    .extra-key { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
    .extra-val { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--ink); font-weight: 600; }
    .extra-val.null-v { color: var(--muted); font-style: italic; font-weight: 400; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #ede8dd 25%, #e5dfcf 50%, #ede8dd 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
      height: 28px;
      width: 60%;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-family: 'Gmarket Sans', sans-serif;
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .clear-btn:hover { border-color: #e8401c; color: #e8401c; }
    .clear-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* URL 편집 */
    .url-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .card-url {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.55);
      word-break: break-all;
      flex: 1;
    }
    .url-edit-btn {
      background: rgba(255,255,255,0.18);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 9px;
      padding: 2px 7px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: 'Gmarket Sans', sans-serif;
      transition: background 0.15s;
    }
    .url-edit-btn:hover { background: rgba(255,255,255,0.32); }

    /* URL 편집 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 18px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
    }
    .modal-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
    .modal-desc { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
    .modal-input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--ink);
      outline: none;
      margin-bottom: 6px;
    }
    .modal-input:focus { border-color: var(--blue); }
    .modal-field-wrap { margin-bottom: 14px; }
    .modal-field-label { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-cancel {
      background: var(--tag); color: var(--ink); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 16px; font-family: 'Gmarket Sans', sans-serif;
      font-size: 12px; cursor: pointer;
    }
    .modal-save {
      background: var(--ink); color: #fff; border: none;
      border-radius: 20px; padding: 8px 18px; font-family: 'Gmarket Sans', sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer;
    }

    .clickable-url {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-color: rgba(255,255,255,0.3);
      transition: color 0.15s;
    }
    .clickable-url:hover { color: rgba(255,255,255,0.9); }
    .clickable-field {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-color: rgba(255,255,255,0.3);
      transition: opacity 0.15s;
    }
    .clickable-field:hover { opacity: 0.75; }

    .err-text { color: #e8401c; font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">API Viewer</div>
  <div class="topbar-time" id="top-time">—</div>
</div>

<div class="controls">
  <button class="refresh-btn" id="refresh-btn" onclick="fetchAll()">
    <span id="btn-icon">↻</span> 새로고침
  </button>
  <button class="auto-toggle" id="auto-btn" onclick="toggleAuto()">자동 갱신 OFF</button>
</div>
<div class="status" id="status"></div>

<div class="cards">

  <!-- API 1: nevr.kr — query -->
  <div class="api-card">
    <div class="card-header red">
      <div style="flex:1;min-width:0">
        <div class="card-name">네이버</div>
        <div class="card-meta-row">
          <span class="meta-key">필드명</span> <span class="clickable-field" id="a1-field-display" onclick="openFieldModal('a1')">QUERY</span>
          <span class="meta-sep">·</span>
          <span class="meta-key">API</span> <span class="clickable-url" id="a1-url-display" onclick="openUrlModal('a1')">nevr.kr/f/025725cac431</span>
        </div>
      </div>
      <div class="card-badge" id="a1-badge">—</div>
    </div>
    <div class="card-value-wrap">
      <div class="value-field-label" id="a1-field-label">query</div>
      <div class="value-text red" id="a1-value">불러오는 중...</div>
      <div class="value-meta" id="a1-meta"></div>
    </div>
    <div class="history-section">
      <div class="history-header">
        <div class="history-label">최근 기록 (Sheets 저장)</div>
        <button class="clear-btn" id="clear-naver" onclick="clearHistory('네이버', 'clear-naver', 'a1-history')">기록 삭제</button>
      </div>
      <div id="a1-history"></div>
    </div>
  </div>

  <!-- API 2: 11z.co — value -->
  <div class="api-card">
    <div class="card-header blue">
      <div style="flex:1;min-width:0">
        <div class="card-name">구글</div>
        <div class="card-meta-row">
          <span class="meta-key">필드명</span> <span class="clickable-field" id="a2-field-display" onclick="openFieldModal('a2')">VALUE</span>
          <span class="meta-sep">·</span>
          <span class="meta-key">API</span> <span class="clickable-url" id="a2-url-display" onclick="openUrlModal('a2')">11z.co/_w/18424/selection</span>
        </div>
      </div>
      <div class="card-badge" id="a2-badge">—</div>
    </div>
    <div class="card-value-wrap">
      <div class="value-field-label" id="a2-field-label">value</div>
      <div class="value-text blue" id="a2-value">불러오는 중...</div>
      <div class="value-meta" id="a2-meta"></div>
    </div>
    <div class="history-section">
      <div class="history-header">
        <div class="history-label">최근 기록 (Sheets 저장)</div>
        <button class="clear-btn" id="clear-google" onclick="clearHistory('구글', 'clear-google', 'a2-history')">기록 삭제</button>
      </div>
      <div id="a2-history"></div>
    </div>
  </div>

</div>

<!-- URL 편집 모달 -->
<div class="modal-overlay" id="url-modal">
  <div class="modal">
    <div class="modal-title" id="url-modal-title">API 주소 편집</div>
    <div class="modal-desc">새 API 주소를 입력하세요.<br>저장하면 즉시 새 주소로 데이터를 불러와요.</div>
    <div class="modal-field-wrap">
      <div class="modal-field-label">API 주소</div>
      <input class="modal-input" id="modal-url" type="text" placeholder="https://example.com/api" />
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="revertUrl()">↩ 되돌리기</button>
      <button class="modal-cancel" onclick="closeModal('url-modal')">취소</button>
      <button class="modal-save" onclick="saveUrl()">저장</button>
    </div>
  </div>
</div>

<!-- 필드명 편집 모달 -->
<div class="modal-overlay" id="field-modal">
  <div class="modal">
    <div class="modal-title" id="field-modal-title">필드명 편집</div>
    <div class="modal-desc">API 응답에서 표시할 필드명을 입력하세요.</div>
    <div class="modal-field-wrap">
      <div class="modal-field-label">필드명</div>
      <input class="modal-input" id="modal-field" type="text" placeholder="query 또는 value 등" />
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="revertField()">↩ 되돌리기</button>
      <button class="modal-cancel" onclick="closeModal('field-modal')">취소</button>
      <button class="modal-save" onclick="saveField()">저장</button>
    </div>
  </div>
</div>

<script>
  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzTwNz5F1cnYEl5DbZQZZlRbLv4xVO5zv5QRBpBOfPwkYFq506Q_yExiVOAMrTfywobXA/exec';
  let autoTimer = null;
  let loading = false;

  // 현재 사용 중인 URL과 필드명 (편집 가능)
  let apis = {
    a1: { url: 'https://nevr.kr/f/025725cac431', field: 'query' },
    a2: { url: 'https://11z.co/_w/18424/selection', field: 'value' }
  };
  // 기본값 (되돌리기용)
  const defaults = {
    a1: { url: 'https://nevr.kr/f/025725cac431', field: 'query' },
    a2: { url: 'https://11z.co/_w/18424/selection', field: 'value' }
  };
  let modalTarget = null;

  function fmt(ts) {
    const d = new Date(ts);
    const diff = Math.floor((Date.now() - d) / 1000);
    let relative;
    if (diff < 60) relative = diff + '초 전';
    else if (diff < 3600) relative = Math.floor(diff / 60) + '분 전';
    else if (diff < 86400) relative = Math.floor(diff / 3600) + '시간 전';
    else relative = Math.floor(diff / 86400) + '일 전';

    const dateStr = d.toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' });
    const timeStr = d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    return dateStr + ' ' + timeStr + ' (' + relative + ')';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function clearHistory(sheetName, btnId, histId) {
    if (!confirm(sheetName + ' 기록을 모두 삭제할까요?')) return;
    const btn = document.getElementById(btnId);
    btn.disabled = true;
    btn.textContent = '삭제 중...';
    try {
      await fetch(SHEETS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'clear', sheet: sheetName })
      });
      document.getElementById(histId).innerHTML =
        '<div style="padding:8px;font-size:11px;color:var(--muted)">기록이 삭제되었습니다</div>';
    } catch(e) {
      alert('삭제 실패: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '기록 삭제';
    }
  }

  function fixVal(val) {
    if (!val) return val;
    // 구글 시트가 날짜로 변환한 값 복원 방지 — 이미 문자열이면 그대로
    const s = String(val);
    // ISO 날짜 형태로 왔을 때 그냥 원본 문자열로 표시
    if (s.match(/^\d{4}-\d{2}-\d{2}T/)) {
      // 날짜로 변환된 경우 — 어쩔 수 없이 그대로 표시 (Sheets 재저장 필요)
      return s;
    }
    return s;
  }

  function openUrlModal(target) {
    modalTarget = target;
    const name = target === 'a1' ? '네이버' : '구글';
    document.getElementById('url-modal-title').textContent = name + ' · API 주소 편집';
    document.getElementById('modal-url').value = apis[target].url;
    document.getElementById('url-modal').classList.add('open');
  }

  function openFieldModal(target) {
    modalTarget = target;
    const name = target === 'a1' ? '네이버' : '구글';
    document.getElementById('field-modal-title').textContent = name + ' · 필드명 편집';
    document.getElementById('modal-field').value = apis[target].field;
    document.getElementById('field-modal').classList.add('open');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    modalTarget = null;
  }

  function saveUrl() {
    const newUrl = document.getElementById('modal-url').value.trim();
    if (!newUrl) { alert('주소를 입력해주세요'); return; }
    apis[modalTarget].url = newUrl;
    document.getElementById(modalTarget + '-url-display').textContent = newUrl.replace(/^https?:\/\//, '');
    updateHistoryVisibility();
    closeModal('url-modal');
    fetchAll();
  }

  function saveField() {
    const newField = document.getElementById('modal-field').value.trim();
    if (!newField) { alert('필드명을 입력해주세요'); return; }
    apis[modalTarget].field = newField;
    document.getElementById(modalTarget + '-field-display').textContent = newField.toUpperCase();
    document.getElementById(modalTarget + '-field-label').textContent = newField;
    updateHistoryVisibility();
    closeModal('field-modal');
    fetchAll();
  }

  function revertUrl() {
    if (!confirm('기본 주소로 되돌릴까요?')) return;
    apis[modalTarget].url = defaults[modalTarget].url;
    document.getElementById(modalTarget + '-url-display').textContent = defaults[modalTarget].url.replace(/^https?:\/\//, '');
    updateHistoryVisibility();
    closeModal('url-modal');
    fetchAll();
  }

  function revertField() {
    if (!confirm('기본 필드명으로 되돌릴까요?')) return;
    apis[modalTarget].field = defaults[modalTarget].field;
    document.getElementById(modalTarget + '-field-display').textContent = defaults[modalTarget].field.toUpperCase();
    document.getElementById(modalTarget + '-field-label').textContent = defaults[modalTarget].field;
    updateHistoryVisibility();
    closeModal('field-modal');
    fetchAll();
  }

  // 모달 바깥 클릭 시 닫기
  document.getElementById('url-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('url-modal');
  });
  document.getElementById('field-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('field-modal');
  });

  function isDefault(target) {
    return apis[target].url === defaults[target].url && apis[target].field === defaults[target].field;
  }

  function updateHistoryVisibility() {
    ['a1', 'a2'].forEach(target => {
      const histSection = document.getElementById(target + '-history').closest('.history-section');
      histSection.style.display = isDefault(target) ? '' : 'none';
    });
  }

  async function fetchAll() {
    if (loading) return;
    loading = true;
    const btn = document.getElementById('refresh-btn');
    const icon = document.getElementById('btn-icon');
    btn.disabled = true;
    icon.innerHTML = '<span class="spinner"></span>';

    // 현재값(API 직접)과 기록(Sheets)을 동시에 불러오기
    await Promise.all([fetchLive(), fetchHistory()]);

    document.getElementById('top-time').textContent = new Date().toLocaleTimeString('ko-KR');
    document.getElementById('status').textContent = '✓ 마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
    loading = false;
    btn.disabled = false;
    icon.textContent = '↻';
  }

  // 현재 최신값 — API 직접 호출
  async function fetchLive() {
    try {
      const res1 = await fetch(apis.a1.url + '?_=' + Date.now());
      const d1 = await res1.json();
      document.getElementById('a1-value').textContent = d1[apis.a1.field] ?? '(값 없음)';
      document.getElementById('a1-meta').textContent = d1.ts ? fmt(d1.ts) + ' · 총 ' + (d1.count || 0) + '개' : '';
      document.getElementById('a1-badge').textContent = d1.number ? 'No.' + d1.number : '—';
    } catch(e) {
      document.getElementById('a1-value').innerHTML = '<span class="err-text">오류: ' + esc(e.message) + '</span>';
    }
    try {
      const res2 = await fetch(apis.a2.url + '?_=' + Date.now());
      const d2 = await res2.json();
      document.getElementById('a2-value').textContent = d2[apis.a2.field] ?? '(값 없음)';
      document.getElementById('a2-badge').textContent = d2.count != null ? d2.count + '개' : '—';
      document.getElementById('a2-meta').textContent = d2.receiveCount != null ? 'receiveCount: ' + d2.receiveCount + ' · source: ' + (d2.source ?? '—') : '';
    } catch(e) {
      document.getElementById('a2-value').innerHTML = '<span class="err-text">오류: ' + esc(e.message) + '</span>';
    }
  }

  // 저장된 기록 — Google Sheets에서 불러오기
  async function fetchHistory() {
    try {
      const res = await fetch(SHEETS_URL + '?_=' + Date.now());
      const data = await res.json();

      // 네이버 기록
      const h1 = document.getElementById('a1-history');
      h1.innerHTML = '';
      (data.naver || []).slice(0, 5).forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'history-item' + (i === 0 ? ' first' : '');
        el.innerHTML =
          '<div class="h-query">' + esc(item.value) + '</div>' +
          '<div class="h-time">' + fmt(item.ts) + '</div>';
        h1.appendChild(el);
      });

      // 구글 기록
      const h2 = document.getElementById('a2-history');
      h2.innerHTML = '';
      (data.google || []).slice(0, 5).forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'history-item' + (i === 0 ? ' first' : '');
        el.innerHTML =
          '<div class="h-query" style="color:' + (i === 0 ? 'var(--blue)' : '') + ';font-weight:' + (i === 0 ? '700' : '400') + '">' + esc(item.value) + '</div>' +
          '<div class="h-time">' + fmt(item.ts) + '</div>';
        h2.appendChild(el);
      });

    } catch(e) {
      document.getElementById('a1-history').innerHTML = '<div style="padding:8px;font-size:11px;color:var(--muted)">기록 불러오기 실패: ' + esc(e.message) + '</div>';
    }
  }

  function toggleAuto() {
    const btn = document.getElementById('auto-btn');
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = null;
      btn.textContent = '자동 갱신 OFF';
      btn.classList.remove('on');
    } else {
      autoTimer = setInterval(fetchAll, 10000); // 10초마다 갱신
      btn.textContent = '자동 갱신 ON (10초)';
      btn.classList.add('on');
      fetchAll();
    }
  }

  // 자동 갱신 기본 ON
  updateHistoryVisibility();
  toggleAuto();
</script>
</body>
</html>
